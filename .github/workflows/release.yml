name: Release ZIP

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/hn-wordpress-toolkit
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='*.zip' \
            . dist/hn-wordpress-toolkit/
          cd dist
          zip -r "../hn-wordpress-toolkit-${VERSION}.zip" hn-wordpress-toolkit/
          cd ..
          echo "ZIP=hn-wordpress-toolkit-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          generate_release_notes: true
